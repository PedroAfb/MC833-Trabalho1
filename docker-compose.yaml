services:
  roteador:
    build: .
    container_name: roteador
    tty: true
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1 # Ativa o encaminhamento de pacotes. Ou seja se chegar um pacote que não é pra esse container docker ele redireciona.
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
    networks:
      rede_a:
        ipv4_address: 10.0.1.254
      rede_b:
        ipv4_address: 10.0.2.254
    command: bash -c "apt-get update; tail -f /dev/null"
    volumes:
      - "/tmp/docker_lab_${USER}/roteador:/app"
    working_dir: /app

  servidor:
    build: .
    container_name: servidor
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
    networks:
      rede_a:
        ipv4_address: 10.0.1.2
    command: bash -c "apt update; tail -f /dev/null"
    volumes:
      - "/tmp/docker_lab_${USER}/servidor:/app"
    working_dir: /app

  cliente:
    build: .
    container_name: client
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
    networks:
      rede_a:
        ipv4_address: 10.0.1.3
    command: bash -c "apt update; tail -f /dev/null"
    volumes:
      - "/tmp/docker_lab_${USER}/cliente:/app"
    working_dir: /app

networks:
  rede_a:
    ipam:
      config:
        - subnet: 10.0.1.0/24
  rede_b:
    ipam:
      config:
        - subnet: 10.0.2.0/24

